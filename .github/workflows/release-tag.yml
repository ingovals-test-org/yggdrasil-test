name: Release - Tag

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  create-tag:
    name: Create release tag
    # Only run for release PRs created by the automation bot — not human-authored PRs
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Parse PR metadata
        id: metadata
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          VERSION=$(echo "$PR_BODY" | grep -oP '(?<=version: )\S+')
          APPS=$(echo "$PR_BODY" | grep -oP '(?<=apps: )\[.*\]')
          if [ -z "$VERSION" ] || [ -z "$APPS" ]; then
            echo "Could not parse release metadata from PR body. Aborting."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "apps=$APPS" >> $GITHUB_OUTPUT

      - name: Create and push annotated tag
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          APPS: ${{ steps.metadata.outputs.apps }}
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "v$VERSION" -m "apps: $APPS" HEAD
          git push origin "v$VERSION"

      - name: Trigger release publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.metadata.outputs.version }}
          APPS: ${{ steps.metadata.outputs.apps }}
        run: |
          gh workflow run release-publish.yml \
            --repo "${{ github.repository }}" \
            --field version="$VERSION" \
            --field apps="$APPS"
