name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            ci
            docs
            style
            refactor
            perf
            test
            build
          requireScope: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: pnpm install --frozen-lockfile

      - name: Lint affected
        run: pnpm exec nx affected --target=lint --base=origin/main

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: pnpm install --frozen-lockfile

      - name: Restore affected
        run: pnpm exec nx affected --target=restore --base=origin/main

      - name: Test affected
        run: pnpm exec nx affected --target=test --base=origin/main

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: pnpm install --frozen-lockfile

      - name: Restore affected
        run: pnpm exec nx affected --target=restore --base=origin/main

      - name: Build affected
        run: pnpm exec nx affected --target=build --base=origin/main
